display_information:
  name: Chat SDK ExampleBot
  description: A bot built with chat-sdk
  background_color: "#1a1a2e"

features:
  bot_user:
    display_name: Chat SDK Bot
    always_online: true
  # Optional: Slack Agent messaging experience. Uncomment (with the
  # assistant:write scope and the agent events below) and set
  # SLACK_AGENT_VIEW=true so the adapter treats Messages-tab opens as the
  # thread-open signal. Note: switching an app to agent_view can't be
  # reverted.
  # agent_view:
  #   agent_description: A bot built with chat-sdk

oauth_config:
  scopes:
    bot:
      # Read messages and mentions
      - app_mentions:read
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - im:history
      - im:read
      - mpim:history
      - mpim:read
      # Send messages and reactions
      - chat:write
      - pins:write
      - reactions:write
      # User info for display names
      - users:read
      # Agent experience (suggested prompts, thinking status) — uncomment
      # together with the agent_view / event blocks below.
      # - assistant:write

settings:
  event_subscriptions:
    # Set this to your deployed webhook URL
    request_url: https://your-deployment.vercel.app/api/webhooks/slack?x-vercel-protection-bypass=TOKEN_HERE
    bot_events:
      - app_mention
      - member_joined_channel
      - message.channels
      - message.groups
      - message.im
      - message.mpim
      # Agent experience events — uncomment together with agent_view above.
      # - app_home_opened
      # - app_context_changed
  interactivity:
    is_enabled: false
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
