  /v3/webhook-subscriptions:
    post:
      operationId: createWebhookSubscription
      summary: Create a new webhook subscription
      description: |
        Create a new webhook subscription to receive events at a target URL.
        Upon creation, a signing secret is generated for verifying webhook
        authenticity. **Store this secret securely — it cannot be retrieved later.**

        **Webhook Delivery:**
        - Events are sent via HTTP POST to the target URL
        - Each request includes `X-Webhook-Signature` and `X-Webhook-Timestamp` headers
        - Signature is HMAC-SHA256 over `{timestamp}.{payload}` — see [Webhook Events](/docs/webhook-events) for verification details
        - Failed deliveries (5xx, 429, network errors) are retried up to 10 times over ~2 hours with exponential backoff
        - Client errors (4xx except 429) are not retried
      tags:
        - Webhooks
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWebhookSubscriptionRequest'
            examples:
              messageEvents:
                summary: Subscribe to message events
                value:
                  target_url: https://webhooks.example.com/linq/events
                  subscribed_events:
                    - message.sent
                    - message.delivered
                    - message.read
              messageEventsWithVersion:
                summary: Subscribe with explicit webhook version
                value:
                  target_url: https://webhooks.example.com/linq/events?version=2026-02-03
                  subscribed_events:
                    - message.sent
                    - message.delivered
                    - message.read
