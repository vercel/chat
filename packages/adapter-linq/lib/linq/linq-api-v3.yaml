          description: Recipient handles (phone numbers or email addresses)
          example:
            - '+12052532136'
        voice_memo:
          $ref: '#/components/schemas/VoiceMemoAttachment'
        status:
          type: string
          description: Current delivery status
          example: queued
        created_at:
          type: string
          format: date-time
          description: When the voice memo was created
    VoiceMemoAttachment:
      type: object
