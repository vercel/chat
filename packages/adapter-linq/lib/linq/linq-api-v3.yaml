          pattern: ^\+[1-9][0-9]{1,14}$
          example: '+12052535597'
        voice_memo_url:
          type: string
          format: uri
          description: URL of the voice memo audio file. Must be a publicly accessible HTTPS URL.
          example: https://example.com/voice-memo.m4a
    SendVoiceMemoResponse:
      type: object
