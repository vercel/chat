          example: '+12052535597'
        to:
          type: array
          description: |
            Array of recipient handles (phone numbers in E.164 format or email addresses).
            For individual chats, provide one recipient. For group chats, provide multiple.
          minItems: 1
          maxItems: 31
          items:
            type: string
          example:
            - '+14155559876'
            - '+14155550123'
