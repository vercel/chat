components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: |
        Bearer token authentication. Include your API token in the Authorization header.

        Format: `Authorization: Bearer <your-token>`
  responses:
    BadRequest:
      description: Invalid request - validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              status: 400
              code: 1002
              message: Phone number must be in E.164 format
            success: false
    Unauthorized:
      description: Unauthorized - missing or invalid authentication
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              status: 401
              code: 2004
              message: Unauthorized - missing or invalid authentication token
            success: false
    Forbidden:
      description: Forbidden - no access to this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              status: 403
              code: 2005
              message: Access denied - insufficient permissions for this resource
            success: false
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              status: 404
              code: 2001
              message: Resource not found
            success: false
    UnprocessableEntity:
      description: Unprocessable Entity - request is valid but cannot be processed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              status: 422
              code: 1003
              message: Request is valid but cannot be processed
            success: false
    RateLimited:
      description: Too many requests - rate limit exceeded
      headers:
        Retry-After:
          description: Number of seconds until the rate limit resets
          schema:
            type: integer
          example: 10
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              status: 429
              code: 4001
              message: Rate limit exceeded. Try again in a few seconds.
            success: false
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              status: 500
              code: 3006
              message: Internal server error
            success: false
    ServiceUnavailable:
      description: Service temporarily unavailable
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error:
              status: 503
              code: 4004
              message: RCS capability check is temporarily unavailable.
            success: false
  schemas:
    MyCardItem:
      type: object
      required:
        - phone_number
        - first_name
        - is_active
      properties:
        phone_number:
          type: string
          example: '+15551234567'
        first_name:
          type: string
          example: John
        last_name:
          type: string
          example: Doe
        image_url:
          type: string
          example: https://cdn.linqapp.com/my-card/example.jpg
        is_active:
          type: boolean
          example: true
    GetMyCardResponse:
      type: object
      required:
        - my_cards
      properties:
        my_cards:
          type: array
          items:
            $ref: '#/components/schemas/MyCardItem'
    SetMyCardRequest:
      type: object
      required:
        - phone_number
      properties:
        phone_number:
          type: string
          description: E.164 phone number to associate the my card with
          example: '+15551234567'
        first_name:
          type: string
          description: First name for the my card. Required when no existing my card exists for this phone number.
          example: John
        last_name:
          type: string
          description: Last name for the my card
          example: Doe
        image_url:
          type: string
          description: URL of the profile image to rehost on the CDN. Only re-uploaded when a new value is provided.
          example: https://cdn.linqapp.com/my-card/example.jpg
    SetMyCardResponse:
      type: object
      required:
        - phone_number
        - first_name
        - is_active
      properties:
        phone_number:
          type: string
          description: The phone number the my card is associated with
          example: '+15551234567'
        first_name:
          type: string
          description: First name on the my card
          example: John
        last_name:
          type: string
          description: Last name on the my card
          example: Doe
        image_url:
          type: string
          description: Image URL on the my card
          example: https://cdn.linqapp.com/my-card/example.jpg
        is_active:
          type: boolean
          description: Whether the my card was successfully applied to the device
          example: true
    HandleCheckRequest:
      type: object
      required:
        - address
      properties:
        address:
          type: string
          description: The recipient phone number or email address to check
          example: '+15551234567'
        from:
          type: string
          description: Optional sender phone number. If omitted, an available phone from your pool is used automatically.
          example: '+15559876543'
    HandleCheckResponse:
      type: object
      required:
        - address
        - available
      properties:
        address:
          type: string
          description: The recipient address that was checked
          example: '+15551234567'
        available:
          type: boolean
          description: Whether the recipient supports the checked messaging service
          example: true
    DeliveryStatus:
      type: string
      description: Current delivery status of a message
      enum:
        - pending
        - queued
        - sent
        - delivered
        - failed
      example: pending
    ServiceType:
      type: string
      description: Messaging service type
      enum:
        - iMessage
        - SMS
        - RCS
      example: iMessage
    ServicePreferenceType:
      type: string
      description: Preferred messaging service type. Includes "auto" for default fallback behavior.
      enum:
        - iMessage
        - SMS
        - RCS
        - auto
      example: iMessage
    SentMessage:
      type: object
      description: A message that was sent (used in CreateChat and SendMessage responses)
      required:
        - id
        - parts
        - sent_at
        - delivery_status
        - is_read
      properties:
        id:
          type: string
          format: uuid
          description: Message identifier (UUID)
          example: 69a37c7d-af4f-4b5e-af42-e28e98ce873a
        service:
          allOf:
            - $ref: '#/components/schemas/ServiceType'
          nullable: true
          description: Service used to send this message
          example: iMessage
        preferred_service:
          allOf:
            - $ref: '#/components/schemas/ServiceType'
          nullable: true
          description: Preferred service for sending this message
          example: iMessage
        parts:
          type: array
          description: Message parts in order (text and media)
          items:
            oneOf:
              - $ref: '#/components/schemas/TextPartResponse'
              - $ref: '#/components/schemas/MediaPartResponse'
        sent_at:
          type: string
          format: date-time
          description: When the message was sent
          example: '2025-10-23T13:07:55.019-05:00'
        delivered_at:
          type: string
          format: date-time
          description: When the message was delivered
          example: null
          nullable: true
        delivery_status:
          $ref: '#/components/schemas/DeliveryStatus'
        is_read:
          type: boolean
          description: Whether the message has been read
          example: false
        effect:
          allOf:
            - $ref: '#/components/schemas/MessageEffect'
          nullable: true
          description: iMessage effect applied to this message (screen or bubble effect)
        from_handle:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ChatHandle'
          description: The sender of this message as a full handle object
        reply_to:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/ReplyTo'
    SendMessageResponse:
      type: object
      description: Response for sending a message to a chat
      required:
        - chat_id
        - message
      properties:
        chat_id:
          type: string
          format: uuid
